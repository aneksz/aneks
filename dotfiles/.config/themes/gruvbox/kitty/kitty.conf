# =========================
# Gruvbox Dark Kitty Theme
# =========================

[env]
TERM = "xterm-256color"

# Font
font_family MapleMono NF CN
bold_italic_font auto
font_size 12.5

# Window
window_padding_width 14
window_padding_height 14
hide_window_decorations yes
show_window_resize_notification no
confirm_os_window_close 0

# Keybindings
map F11 toggle_fullscreen
map ctrl+insert copy_to_clipboard
map shift+insert paste_from_clipboard

# Remote access
single_instance yes
allow_remote_control yes

# Aesthetics
cursor_shape block
enable_audio_bell no

# Tab bar
tab_bar_edge bottom
tab_bar_style powerline
tab_powerline_style slanted
tab_title_template {title}{' :{}:'.format(num_windows) if num_windows > 1 else ''}
background_opacity 0.98

# =========================
# Colors
# =========================

# Foreground / Background
foreground            #ebdbb2   # Gruvbox fg1
background            #282828   # Gruvbox bg1

# Selection
selection_foreground  #282828   # bg1
selection_background  #d79921   # yellow

# Cursor
cursor                #d79921   # yellow
cursor_text_color     #282828   # bg1

# URL highlight
url_color             #83a598   # blue-bright

# Window borders
active_border_color   #d3869b   # purple-bright
inactive_border_color #504945   # bg4
bell_border_color     #fb4934   # red-bright

# Tab bar
active_tab_foreground   #282828  # bg1
active_tab_background   #d3869b  # purple-bright
inactive_tab_foreground #ebdbb2  # fg1
inactive_tab_background #3c3836  # bg3
tab_bar_background      #282828  # bg1

# Marks (text highlights)
mark1_foreground #282828
mark1_background #83a598   # blue-bright
mark2_foreground #282828
mark2_background #d3869b   # purple-bright
mark3_foreground #282828
mark3_background #8ec07c   # aqua-bright

# =========================
# 16 Terminal Colors
# =========================

# Black
color0  #3c3836   # bg3
color8  #504945   # bg4

# Red
color1  #cc241d   # red
color9  #fb4934   # red-bright

# Green
color2  #98971a   # green
color10 #b8bb26   # green-bright

# Yellow
color3  #d79921   # yellow
color11 #fabd2f   # yellow-bright

# Blue
color4  #458588   # blue
color12 #83a598   # blue-bright

# Magenta / Purple
color5  #b16286   # purple
color13 #d3869b   # purple-bright

# Cyan / Aqua
color6  #689d6a   # aqua
color14 #8ec07c   # aqua-bright

# White / Foreground
color7  #ebdbb2   # fg1
color15 #fbf1c7   # fg0
